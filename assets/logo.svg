<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Digital Goods logo">
  <defs>
    <linearGradient id="bg" x1="40" y1="30" x2="600" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="shine" x1="160" y1="80" x2="520" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1020" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Rounded tile -->
  <rect x="56" y="40" width="528" height="400" rx="28" fill="url(#bg)" filter="url(#softShadow)"/>
  <path d="M110 92c96-34 178-36 270 6s152 104 164 196c-34 92-108 132-218 140S154 394 96 316c-24-94-6-170 14-224Z" fill="url(#shine)"/>

  <!-- Circuit dots -->
  <g fill="#e6f6ff" opacity="0.85">
    <circle cx="120" cy="120" r="4"/>
    <circle cx="168" cy="108" r="3"/>
    <circle cx="210" cy="140" r="3"/>
    <circle cx="520" cy="120" r="4"/>
    <circle cx="472" cy="108" r="3"/>
    <circle cx="430" cy="140" r="3"/>
    <circle cx="164" cy="356" r="3"/>
    <circle cx="476" cy="360" r="3"/>
  </g>
  <g stroke="#e6f6ff" opacity="0.55" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M120 120h44"/>
    <path d="M168 108l42 32"/>
    <path d="M520 120h-44"/>
    <path d="M472 108l-42 32"/>
    <path d="M164 356h68"/>
    <path d="M476 360h-72"/>
  </g>

  <!-- Paper plane / send icon -->
  <g transform="translate(0,0)">
    <path d="M182 264c-5.8-2-6-10.1-.3-12.3l255.8-100.7c6.4-2.5 12.9 3.4 11 9.9L404 343.7c-1.6 5.8-8.6 7.9-13 4l-74.3-51.3-42.9 41c-4.3 4.1-11.5 1.1-11.5-4.8l.6-61.9-80.9-6.7Z" fill="#ffffff" opacity="0.98"/>
    <path d="M262.9 270.7 416.6 171.4c3.2-2.1 6.2 1.9 3.4 4.5L318.3 279.8" fill="none" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <path d="M262.6 270.5 262 327.3" fill="none" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="middle">
    <text x="320" y="108" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="0.6">DIGITAL GOODS</text>
    <text x="320" y="142" font-size="16" font-weight="600" fill="#dff6ff" opacity="0.95" letter-spacing="0.4">eSIM " gift cards " delivery by email</text>
  </g>
</svg>

