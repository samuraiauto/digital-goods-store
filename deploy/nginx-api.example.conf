# Пример reverse-proxy с HTTPS (Let's Encrypt / certbot) к Node на 127.0.0.1:3000.
# Замените api.example.com и пути к сертификатам.
#
# После настройки HTTPS в config.js укажите:
#   window.BACKEND_BASE_URL = "https://api.example.com";
# (или задайте ту же строку вручную в начале config.js для *.github.io)

server {
    listen 80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
